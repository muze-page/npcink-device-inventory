name: Build preview packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Choose what to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - plugin
          - desktop
          - macos
          - windows

permissions:
  contents: read

jobs:
  wordpress-plugin:
    name: WordPress plugin zip
    if: ${{ inputs.package == 'all' || inputs.package == 'plugin' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vite-admin/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHP syntax check
        run: |
          php -v
          php -l npcink-device-inventory.php
          php -l uninstall.php
          php -l index.php
          find admin includes -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: PHP coding standards
        run: composer phpcs

      - name: PHP static analysis
        run: composer phpstan

      - name: Build admin app
        working-directory: vite-admin
        run: |
          npm install
          npm run build

      - name: Package plugin
        run: bash .github/scripts/package-wordpress-plugin.sh

      - name: Plugin Check
        uses: wordpress/plugin-check-action@v1.1.7
        with:
          build-dir: ./release/npcink-device-inventory

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: preview-npcink-device-inventory-plugin
          path: release/npcink-device-inventory.zip
          if-no-files-found: error
          retention-days: 7

  desktop-macos:
    name: Desktop agent (macOS)
    if: ${{ inputs.package == 'all' || inputs.package == 'desktop' || inputs.package == 'macos' }}
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ele-rs/package-lock.json

      - name: Install frontend dependencies
        working-directory: ele-rs
        run: npm ci

      - name: Use stable Rust
        run: |
          rustup default stable
          rustup show

      - name: Check Rust collector
        working-directory: ele-rs
        run: cargo check

      - name: Check Tauri shell
        working-directory: ele-rs/src-tauri
        run: cargo check

      - name: Build Tauri bundle
        working-directory: ele-rs
        run: npm run tauri:build

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: preview-npcink-device-agent-macos
          path: ele-rs/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  desktop-windows:
    name: Desktop agent (Windows)
    if: ${{ inputs.package == 'all' || inputs.package == 'desktop' || inputs.package == 'windows' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ele-rs/package-lock.json

      - name: Install frontend dependencies
        working-directory: ele-rs
        run: npm ci

      - name: Use stable Rust
        run: |
          rustup default stable
          rustup show

      - name: Check Rust collector
        working-directory: ele-rs
        run: cargo check

      - name: Check Tauri shell
        working-directory: ele-rs/src-tauri
        run: cargo check

      - name: Build Tauri bundle
        working-directory: ele-rs
        run: npm run tauri:build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: preview-npcink-device-agent-windows
          path: ele-rs/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7
