name: Build preview packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Choose what to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - plugin
          - desktop
          - macos
          - windows

permissions:
  contents: read

jobs:
  wordpress-plugin:
    name: WordPress plugin zip
    if: ${{ inputs.package == 'all' || inputs.package == 'plugin' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build admin app
        working-directory: vite-admin
        run: |
          npm ci
          npm run build

      - name: Build search app
        working-directory: vite-search
        run: |
          npm install
          npm run build

      - name: Package plugin
        run: bash .github/scripts/package-wordpress-plugin.sh

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: preview-magick-device-manage-plugin
          path: release/magick-device-manage-plugin.zip
          if-no-files-found: error
          retention-days: 7

  desktop-macos:
    name: Desktop agent (macOS)
    if: ${{ inputs.package == 'all' || inputs.package == 'desktop' || inputs.package == 'macos' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ele-rs/package-lock.json

      - name: Install frontend dependencies
        working-directory: ele-rs
        run: npm ci

      - name: Use stable Rust
        run: |
          rustup default stable
          rustup show

      - name: Build Tauri bundle
        working-directory: ele-rs
        run: npm run tauri:build

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: preview-magick-device-agent-macos
          path: ele-rs/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  desktop-windows:
    name: Desktop agent (Windows)
    if: ${{ inputs.package == 'all' || inputs.package == 'desktop' || inputs.package == 'windows' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ele-rs/package-lock.json

      - name: Install frontend dependencies
        working-directory: ele-rs
        run: npm ci

      - name: Use stable Rust
        run: |
          rustup default stable
          rustup show

      - name: Build Tauri bundle
        working-directory: ele-rs
        run: npm run tauri:build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: preview-magick-device-agent-windows
          path: ele-rs/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7
