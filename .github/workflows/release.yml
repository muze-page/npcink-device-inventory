name: Build release packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  wordpress-plugin:
    name: WordPress plugin zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            vite-admin/package-lock.json
            vite-search/package-lock.json

      - name: PHP syntax check
        run: |
          php -v
          php -l npcink-device-manage.php
          php -l uninstall.php
          php -l index.php
          find admin includes -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Build admin app
        working-directory: vite-admin
        run: |
          npm ci
          npm run build

      - name: Build search app
        working-directory: vite-search
        run: |
          npm ci
          npm run build

      - name: Package plugin
        run: bash .github/scripts/package-wordpress-plugin.sh

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: npcink-device-manage-plugin
          path: release/npcink-device-manage-plugin.zip
          if-no-files-found: error

  desktop-agent:
    name: Desktop agent (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ele-rs/package-lock.json

      - name: Install frontend dependencies
        working-directory: ele-rs
        run: npm ci

      - name: Use stable Rust
        run: |
          rustup default stable
          rustup show

      - name: Check Rust collector
        working-directory: ele-rs
        run: cargo check

      - name: Check Tauri shell
        working-directory: ele-rs/src-tauri
        run: cargo check

      - name: Build Tauri bundle
        working-directory: ele-rs
        run: npm run tauri:build

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: npcink-device-agent-macos
          path: ele-rs/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: npcink-device-agent-windows
          path: ele-rs/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  github-release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [wordpress-plugin, desktop-agent]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -t release_assets < <(find artifacts -type f | sort)
          gh release create "${TAG_NAME}" "${release_assets[@]}" --repo "${GITHUB_REPOSITORY}" --generate-notes --title "${TAG_NAME}"
