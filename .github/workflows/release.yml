name: Build release packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release_plan:
    name: Release scope
    runs-on: ubuntu-latest
    outputs:
      desktop: ${{ steps.scope.outputs.desktop }}
      mode: ${{ steps.scope.outputs.mode }}
      previous_tag: ${{ steps.scope.outputs.previous_tag }}
      reason: ${{ steps.scope.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check release scope rules
        run: node scripts/check-release-scope.mjs

      - name: Determine release scope
        id: scope
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node scripts/detect-release-scope.mjs

  wordpress_plugin:
    name: WordPress plugin zip
    needs: release_plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vite-admin/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHP syntax check
        run: |
          php -v
          php -l npcink-device-inventory.php
          php -l uninstall.php
          php -l index.php
          find admin includes -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: PHP coding standards
        run: composer phpcs

      - name: PHP static analysis
        run: composer phpstan

      - name: Build admin app
        working-directory: vite-admin
        run: |
          npm install
          npm run build

      - name: Package plugin
        run: bash .github/scripts/package-wordpress-plugin.sh

      - name: Plugin Check
        uses: wordpress/plugin-check-action@v1.1.7
        with:
          build-dir: ./release/npcink-device-inventory

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: npcink-device-inventory-plugin
          path: release/npcink-device-inventory.zip
          if-no-files-found: error

  desktop_agent:
    name: Desktop agent (${{ matrix.os }})
    needs: release_plan
    if: needs.release_plan.outputs.desktop == 'true'
    runs-on: ${{ matrix.os }}
    env:
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_HTTP_TIMEOUT: "120"
      CARGO_NET_RETRY: "10"
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ele-rs/package-lock.json

      - name: Install frontend dependencies
        working-directory: ele-rs
        run: npm ci

      - name: Use stable Rust
        run: |
          rustup default stable
          rustup show

      - name: Check Rust collector
        working-directory: ele-rs
        run: cargo check

      - name: Check Tauri shell
        working-directory: ele-rs/src-tauri
        run: cargo check

      - name: Verify updater signing key
        shell: bash
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is required to build updater artifacts."
            exit 1
          fi

      - name: Prepare updater build config
        working-directory: ele-rs
        run: |
          node -e "require('fs').writeFileSync('updater-build.json', JSON.stringify({ bundle: { createUpdaterArtifacts: true } }))"

      - name: Build Tauri bundle
        working-directory: ele-rs
        run: npm run tauri:build -- --ci --config updater-build.json

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: npcink-device-agent-macos
          path: |
            ele-rs/src-tauri/target/release/bundle/dmg/*.dmg
            ele-rs/src-tauri/target/release/bundle/**/*.tar.gz
            ele-rs/src-tauri/target/release/bundle/**/*.tar.gz.sig
          if-no-files-found: error

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: npcink-device-agent-windows
          path: |
            ele-rs/src-tauri/target/release/bundle/nsis/*.exe
            ele-rs/src-tauri/target/release/bundle/nsis/*.exe.sig
          if-no-files-found: error

  github_release_plugin:
    name: GitHub Release (plugin only)
    needs: [release_plan, wordpress_plugin]
    if: needs.release_plan.outputs.desktop != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v8
        with:
          name: npcink-device-inventory-plugin
          path: artifacts

      - name: Reuse desktop update manifests
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIOUS_TAG: ${{ needs.release_plan.outputs.previous_tag }}
        run: |
          mkdir -p artifacts/desktop-manifests
          test -n "${PREVIOUS_TAG}"
          gh release download "${PREVIOUS_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern latest.json \
            --pattern latest-desktop.json \
            --dir artifacts/desktop-manifests
          test -f artifacts/desktop-manifests/latest.json
          test -f artifacts/desktop-manifests/latest-desktop.json

      - name: Create plugin release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -t release_assets < <(find artifacts -type f | sort)
          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${release_assets[@]}" --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${TAG_NAME}" "${release_assets[@]}" --repo "${GITHUB_REPOSITORY}" --generate-notes --title "${TAG_NAME}"
          fi

  github_release_desktop:
    name: GitHub Release (plugin and desktop)
    needs: [release_plan, wordpress_plugin, desktop_agent]
    if: >-
      always() &&
      needs.release_plan.outputs.desktop == 'true' &&
      needs.wordpress_plugin.result == 'success' &&
      needs.desktop_agent.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Build desktop update manifests
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: node scripts/build-desktop-update-manifests.mjs artifacts

      - name: Check desktop update manifests
        run: npm run check:desktop-manifests -- artifacts

      - name: Create desktop release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -t release_assets < <(find artifacts -type f | sort)
          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${release_assets[@]}" --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${TAG_NAME}" "${release_assets[@]}" --repo "${GITHUB_REPOSITORY}" --generate-notes --title "${TAG_NAME}"
          fi
