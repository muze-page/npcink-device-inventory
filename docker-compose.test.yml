services:
  database:
    image: ${NPCINK_DOCKER_DB_IMAGE:-mariadb:11}
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - database_data:/var/lib/mysql

  wordpress:
    image: ${NPCINK_DOCKER_WORDPRESS_IMAGE:-wordpress:php8.3-apache}
    depends_on:
      database:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: database:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_ENVIRONMENT_TYPE', 'local');
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$socket = @fsockopen(\"127.0.0.1\", 80); exit($$socket ? 0 : 1);'"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - wordpress_data:/var/www/html

  cli:
    image: ${NPCINK_DOCKER_CLI_IMAGE:-wordpress:cli-php8.3}
    user: "0:0"
    entrypoint: ["wp", "--allow-root"]
    depends_on:
      wordpress:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: database:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    working_dir: /var/www/html
    volumes:
      - wordpress_data:/var/www/html
      - ./:/workspace:ro

volumes:
  database_data:
  wordpress_data:
